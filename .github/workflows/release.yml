name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Version ──────────────────────────────────────────────────────────────────
  version:
    name: Compute Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history so git describe can find tags

      - name: Compute version
        id: version
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null)
          # If no tags exist, git returns a bare commit hash — make it semver-ish
          if [[ ! "$VERSION" =~ ^v ]]; then
            VERSION="v0.0.0-dev+${VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Computed version: ${VERSION}"

  # ── Build ─────────────────────────────────────────────────────────────────────
  build:
    name: Build / ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: macos-13       # Intel — native amd64
            goos: darwin
            goarch: amd64
          - runner: macos-latest   # Apple Silicon — native arm64
            goos: darwin
            goarch: arm64
          - runner: ubuntu-latest  # cross-compile via mingw-w64
            goos: windows
            goarch: amd64
    runs-on: ${{ matrix.runner }}
    env:
      VERSION: ${{ needs.version.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Fyne requires CGO + X11/GL headers on Linux
      - name: Install Linux system dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxxf86vm-dev

      # Windows cross-compilation from Linux via mingw-w64
      - name: Install Windows cross-compile toolchain
        if: matrix.goos == 'windows'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-mingw-w64-x86-64 \
            g++-mingw-w64-x86-64

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p build
          BASE="compactmapper-${VERSION}-${GOOS}-${GOARCH}"

          if [ "${GOOS}" = "windows" ]; then
            CGO_ENABLED=1 \
            CC=x86_64-w64-mingw32-gcc \
            CXX=x86_64-w64-mingw32-g++ \
            CGO_CFLAGS="-O2" \
            CGO_LDFLAGS="-O2" \
            go build \
              -ldflags "-H windowsgui -X main.version=${VERSION}" \
              -o "build/${BASE}.exe" \
              ./cmd/compactmapper

            cd build
            zip "${BASE}.zip" "${BASE}.exe"
            rm "${BASE}.exe"
            ARTIFACT="${BASE}.zip"
          else
            CGO_ENABLED=1 \
            CGO_CFLAGS="-O2" \
            CGO_LDFLAGS="-O2" \
            go build \
              -ldflags "-X main.version=${VERSION}" \
              -o "build/${BASE}" \
              ./cmd/compactmapper

            ARTIFACT="${BASE}"
          fi

          # Compute checksum (sha256sum on Linux, shasum on macOS)
          cd build
          if command -v sha256sum &>/dev/null; then
            sha256sum "${ARTIFACT}" > "${ARTIFACT}.sha256"
          else
            shasum -a 256 "${ARTIFACT}" > "${ARTIFACT}.sha256"
          fi

          echo "Built: ${ARTIFACT}"
          cat "${ARTIFACT}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/
          retention-days: 7

  # ── Release ───────────────────────────────────────────────────────────────────
  # Only runs on tag push — workflow_dispatch produces downloadable artifacts only.
  release:
    name: Create GitHub Release
    needs: [version, build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    env:
      VERSION: ${{ needs.version.outputs.version }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true  # flatten into single directory

      - name: Aggregate checksums
        run: |
          # Combine per-platform .sha256 files into one manifest
          find artifacts -name "*.sha256" | sort | xargs cat > artifacts/checksums.sha256
          find artifacts -name "*.sha256" ! -name "checksums.sha256" -delete
          echo "=== checksums.sha256 ==="
          cat artifacts/checksums.sha256

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${VERSION}" \
            --repo "${GH_REPO}" \
            --title "CompactMapper ${VERSION}" \
            --generate-notes \
            artifacts/*
